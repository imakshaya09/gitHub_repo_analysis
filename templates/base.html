<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Repositories Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        padding-top: 2rem;
      }
      .table-wrap {
        overflow-x: auto;
      }
      .repo-link {
        color: #0d6efd;
        text-decoration: none;
      }
      .repo-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4">
        <div>
          <h1 class="h3">GitHub Repository Analyzer</h1>
          <p class="text-muted mb-0">Grouped by language and categorized from repo descriptions.</p>
        </div>
        <div class="mt-3 mt-md-0">
          <button id="refreshButton" class="btn btn-primary">Refresh data</button>
          <span id="statusBadge" class="badge bg-secondary ms-2">Idle</span>
        </div>
      </div>
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
